<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 Elapsed Time Teaching Tool</title>
    <style>
        :root {
            --start-color: #3498db;
            --start-light: #ebf5fb;
            --finish-color: #e67e22;
            --finish-light: #fdf2e9;
            --success-color: #2ecc71;
            --success-light: #eafaf1;
            --dark-blue: #2c3e50;
            --accent-pink: #e91e63;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #f7f9fc;
            color: #2c3e50;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            border: 4px solid #eef2f5;
            padding: 25px;
            box-sizing: border-box;
        }

        /* Language Toggle Bar */
        .language-selector-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .lang-toggle {
            display: flex;
            background: #e2e8f0;
            border-radius: 30px;
            padding: 4px;
            border: 2px solid #cbd5e1;
        }

        .lang-btn {
            border: none;
            background: none;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background-color: #1e3a8a;
            color: white;
            box-shadow: 0 2px 6px rgba(30, 58, 138, 0.2);
        }

        /* Header design */
        header {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #e0f2fe, #e0e7ff);
            padding: 15px;
            border-radius: 16px;
            border: 2px dashed #93c5fd;
        }

        header h1 {
            margin: 0 0 5px 0;
            font-size: 2.2rem;
            color: #1e3a8a;
            text-shadow: 1px 1px 0px #fff;
        }

        header p {
            margin: 0;
            font-size: 1.2rem;
            color: #4b5563;
            font-weight: bold;
        }

        /* Responsive Grid for Clocks */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Clock Card container */
        .clock-card {
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .clock-card.start-card {
            background-color: var(--start-light);
            border: 3px solid #90caf9;
        }

        .clock-card.finish-card {
            background-color: var(--finish-light);
            border: 3px solid #ffcc80;
        }

        .clock-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .clock-title span {
            font-size: 1.1rem;
            color: #64748b;
            font-weight: normal;
        }

        .start-card .clock-title { color: #1565c0; }
        .finish-card .clock-title { color: #d84315; }

        /* SVG clock styling */
        .clock-svg {
            width: 100%;
            max-width: 290px;
            height: auto;
            aspect-ratio: 1/1;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
            background: white;
            border-radius: 50%;
        }

        /* Interactive Clock Hands */
        .hand-hour {
            stroke: #2563eb; /* Blue for Hours */
            stroke-width: 8;
            stroke-linecap: round;
        }

        .hand-minute {
            stroke: #dc2626; /* Red for Minutes */
            stroke-width: 5;
            stroke-linecap: round;
        }

        /* Dynamic Digital readout */
        .digital-readout {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            background: #fff;
            padding: 5px 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid #cbd5e1;
            letter-spacing: 1px;
        }

        .start-card .digital-readout { color: #1565c0; border-color: #90caf9; }
        .finish-card .digital-readout { color: #d84315; border-color: #ffcc80; }

        /* Classroom Smartboard Controls (+ / - buttons) */
        .smart-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
        }

        .control-group {
            background: white;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-group-title {
            font-size: 1rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 8px;
        }

        .btn-grid {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-adjust {
            flex: 1;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 10px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
            color: white;
        }

        .btn-adjust:active {
            transform: scale(0.9);
        }

        .start-card .btn-adjust.btn-plus { background-color: #3b82f6; }
        .start-card .btn-adjust.btn-minus { background-color: #93c5fd; }
        .finish-card .btn-adjust.btn-plus { background-color: #f97316; }
        .finish-card .btn-adjust.btn-minus { background-color: #fdba74; }

        /* AMPM switch design */
        .ampm-switch-container {
            display: flex;
            background: white;
            border-radius: 30px;
            padding: 4px;
            border: 2px solid #cbd5e1;
            margin-top: 15px;
            width: 160px;
        }

        .ampm-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 8px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }

        .start-card .ampm-btn.active {
            background-color: #2563eb;
            color: white;
        }

        .finish-card .ampm-btn.active {
            background-color: #ea580c;
            color: white;
        }

        /* Quick-select select elements for Backup */
        .backup-dropdowns {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .backup-dropdowns select {
            font-size: 1rem;
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-weight: bold;
        }

        /* Action & Result panel */
        .action-panel {
            text-align: center;
            margin-top: 25px;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 45px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
            line-height: 1.2;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-calculate:active {
            transform: translateY(1px);
        }

        /* Beautiful Output Display */
        .output-container {
            margin-top: 25px;
            background: var(--success-light);
            border: 3px solid #a7f3d0;
            border-radius: 20px;
            padding: 25px;
            display: none;
            animation: popIn 0.3s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .output-heading {
            font-size: 1.4rem;
            font-weight: bold;
            color: #065f46;
            margin-bottom: 10px;
        }

        .output-time {
            font-size: 2.8rem;
            color: #047857;
            font-weight: 800;
            margin: 10px 0;
            line-height: 1.2;
        }

        .output-time span.unit {
            font-size: 1.8rem;
            font-weight: normal;
            color: #065f46;
            margin: 0 5px;
        }

        /* Timeline Jumps Drawing (Visual Representation) */
        .timeline-box {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border: 2px solid #e2e8f0;
            overflow-x: auto;
        }

        .timeline-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 10px;
            text-align: left;
        }

        .timeline-jumps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 600px;
            padding: 10px 0;
        }

        .timeline-node {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .timeline-node.highlight {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }

        .timeline-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .timeline-arrow-curve {
            width: 80px;
            height: 30px;
            border-top: 3px dashed var(--accent-pink);
            border-left: 3px dashed transparent;
            border-right: 3px dashed transparent;
            border-radius: 50% 50% 0 0;
            position: relative;
        }

        .timeline-arrow-curve::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid var(--accent-pink);
        }

        .timeline-arrow-label {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--accent-pink);
            margin-top: 2px;
            text-align: center;
            line-height: 1.2;
        }

        /* Custom alert */
        .alert-modal {
            background: #fef2f2;
            border: 3px solid #fecaca;
            color: #991b1b;
            border-radius: 16px;
            padding: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            display: none;
            margin-top: 20px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Language Toggle Switch -->
    <div class="language-selector-container">
        <div class="lang-toggle">
            <button class="lang-btn active" id="lang-bilingual" onclick="setLanguage('bilingual')">Bilingual (雙語)</button>
            <button class="lang-btn" id="lang-english" onclick="setLanguage('english')">English Only</button>
        </div>
    </div>

    <header>
        <h1 id="app-title">How Much Time Has Passed? ｜ 經過了多少時間？</h1>
        <p id="app-subtitle">Primary 2 Mathematics Teaching Tool • 小學二年級數學教材</p>
    </header>

    <div class="workspace">
        <!-- START CLOCK CARD -->
        <div class="clock-card start-card">
            <div class="clock-title" id="start-clock-title">
                開始時間
                <span>Starting Time</span>
            </div>
            
            <svg id="start-clock" class="clock-svg" viewBox="0 0 200 200">
                <!-- Clock face background is appended programmatically in JS -->
                <line id="start-hour" class="hand-hour" x1="100" y1="100" x2="100" y2="55"></line>
                <line id="start-minute" class="hand-minute" x1="100" y1="100" x2="100" y2="35"></line>
                <circle cx="100" cy="100" r="5" fill="#1e293b"></circle>
            </svg>

            <div id="start-digital" class="digital-readout">09:00 AM</div>

            <!-- AMPM Toggle -->
            <div class="ampm-switch-container">
                <button class="ampm-btn active" id="start-am-btn" onclick="setAMPM('start', 'AM')">AM</button>
                <button class="ampm-btn" id="start-pm-btn" onclick="setAMPM('start', 'PM')">PM</button>
            </div>

            <!-- Smartboard Large Adjust Buttons -->
            <div class="smart-controls">
                <div class="control-group">
                    <span class="control-group-title" id="start-hours-label">小時 Hours</span>
                    <div class="btn-grid">
                        <button class="btn-adjust btn-minus" onclick="adjustTime('start', 'hour', -1)">-</button>
                        <button class="btn-adjust btn-plus" onclick="adjustTime('start', 'hour', 1)">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <span class="control-group-title" id="start-mins-label">分鐘 Mins</span>
                    <div class="btn-grid">
                        <button class="btn-adjust btn-minus" onclick="adjustTime('start', 'minute', -5)">-</button>
                        <button class="btn-adjust btn-plus" onclick="adjustTime('start', 'minute', 5)">+</button>
                    </div>
                </div>
            </div>

            <!-- Backup Dropdowns -->
            <div class="backup-dropdowns">
                <select id="start-select-hour" onchange="syncDropdowns('start')"></select>
                <select id="start-select-min" onchange="syncDropdowns('start')"></select>
            </div>
        </div>

        <!-- FINISH CLOCK CARD -->
        <div class="clock-card finish-card">
            <div class="clock-title" id="finish-clock-title">
                結束時間
                <span>Finishing Time</span>
            </div>
            
            <svg id="finish-clock" class="clock-svg" viewBox="0 0 200 200">
                <line id="finish-hour" class="hand-hour" x1="100" y1="100" x2="100" y2="55"></line>
                <line id="finish-minute" class="hand-minute" x1="100" y1="100" x2="100" y2="35"></line>
                <circle cx="100" cy="100" r="5" fill="#1e293b"></circle>
            </svg>

            <div id="finish-digital" class="digital-readout">10:30 AM</div>

            <!-- AMPM Toggle -->
            <div class="ampm-switch-container">
                <button class="ampm-btn active" id="finish-am-btn" onclick="setAMPM('finish', 'AM')">AM</button>
                <button class="ampm-btn" id="finish-pm-btn" onclick="setAMPM('finish', 'PM')">PM</button>
            </div>

            <!-- Smartboard Large Adjust Buttons -->
            <div class="smart-controls">
                <div class="control-group">
                    <span class="control-group-title" id="finish-hours-label">小時 Hours</span>
                    <div class="btn-grid">
                        <button class="btn-adjust btn-minus" onclick="adjustTime('finish', 'hour', -1)">-</button>
                        <button class="btn-adjust btn-plus" onclick="adjustTime('finish', 'hour', 1)">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <span class="control-group-title" id="finish-mins-label">分鐘 Mins</span>
                    <div class="btn-grid">
                        <button class="btn-adjust btn-minus" onclick="adjustTime('finish', 'minute', -5)">-</button>
                        <button class="btn-adjust btn-plus" onclick="adjustTime('finish', 'minute', 5)">+</button>
                    </div>
                </div>
            </div>

            <!-- Backup Dropdowns -->
            <div class="backup-dropdowns">
                <select id="finish-select-hour" onchange="syncDropdowns('finish')"></select>
                <select id="finish-select-min" onchange="syncDropdowns('finish')"></select>
            </div>
        </div>
    </div>

    <!-- Actions & Output Results -->
    <div class="action-panel">
        <button class="btn-calculate" id="btn-calculate-text" onclick="calculateTimePassed()">
            計算經過時間<br>
            <span style="font-size: 1.2rem; font-weight: normal; opacity: 0.9;">Calculate Elapsed Time</span>
        </button>

        <div id="alert-message" class="alert-modal"></div>

        <div id="output-box" class="output-container">
            <div class="output-heading" id="output-heading-text">經過時間是 / The elapsed time is:</div>
            <div id="output-text" class="output-time"></div>
            
            <!-- Step-by-Step Bridge Counting Diagram (Highly Educational!) -->
            <div class="timeline-box">
                <div class="timeline-title" id="timeline-title-text">💡 數數看 (Step-by-step visual jumps):</div>
                <div id="timeline-diagram" class="timeline-jumps"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuration states
    let currentLanguage = 'bilingual'; // 'bilingual' or 'english'

    const state = {
        start: { hour: 9, minute: 0, ampm: 'AM' },
        finish: { hour: 10, minute: 30, ampm: 'AM' }
    };

    // Dictionary mappings for toggling languages dynamically
    const translations = {
        bilingual: {
            title: "How Much Time Has Passed? ｜ 經過了多少時間？",
            subtitle: "Primary 2 Mathematics Teaching Tool • 小學二年級數學教材",
            startTitle: '開始時間<br><span>Starting Time</span>',
            finishTitle: '結束時間<br><span>Finishing Time</span>',
            hours: '小時 Hours',
            mins: '分鐘 Mins',
            calcBtn: '計算經過時間<br><span style="font-size: 1.2rem; font-weight: normal; opacity: 0.9;">Calculate Elapsed Time</span>',
            outputHeading: '經過時間是 / The elapsed time is:',
            timelineTitle: '💡 數數看 (Step-by-step visual jumps):',
            amText: '上午 AM',
            pmText: '下午 PM',
            hourUnit: '小時',
            minUnit: '分鐘',
            andText: '和',
            hourJumpLabel: '1 小時<br>1 Hour',
            hoursJumpLabel: '小時<br>Hours',
            minJumpLabel: '分鐘<br>Mins',
            sameTimeText: '0 分鐘 (時間相同)',
            sameTimeTextEn: '0 minutes (Same time)',
            errorText: '❌ 錯誤：結束時間必須在開始時間之後！<br><span style="font-size: 1.1rem; font-weight: normal;">Error: Finishing time must be later than starting time!</span>'
        },
        english: {
            title: "How Much Time Has Passed?",
            subtitle: "Primary 2 Mathematics Teaching Tool",
            startTitle: 'Starting Time',
            finishTitle: 'Finishing Time',
            hours: 'Hours',
            mins: 'Mins',
            calcBtn: 'Calculate Elapsed Time',
            outputHeading: 'The elapsed time is:',
            timelineTitle: "💡 Let's Count (Step-by-step visual jumps):",
            amText: 'AM',
            pmText: 'PM',
            hourUnit: 'hour',
            hoursUnit: 'hours',
            minUnit: 'minute',
            minsUnit: 'minutes',
            andText: 'and',
            hourJumpLabel: '1 Hour',
            hoursJumpLabel: 'Hours',
            minJumpLabel: 'Mins',
            sameTimeText: '0 minutes (Same time)',
            sameTimeTextEn: '0 minutes (Same time)',
            errorText: '❌ <b>Error:</b> Finishing time must be later than starting time!'
        }
    };

    window.onload = function() {
        populateDropdowns();
        buildClockFaces();
        updateUI('start');
        updateUI('finish');
        applyLanguageStrings();
    };

    // Toggles the active language state and forces translation redraw
    function setLanguage(lang) {
        currentLanguage = lang;
        document.getElementById('lang-bilingual').classList.toggle('active', lang === 'bilingual');
        document.getElementById('lang-english').classList.toggle('active', lang === 'english');
        
        applyLanguageStrings();
        updateUI('start');
        updateUI('finish');

        // If the output is currently open, recalculate to instantly translate the output strings and timeline labels
        if (document.getElementById('output-box').style.display === 'block') {
            calculateTimePassed();
        }
        // If an error message is active, update that too
        if (document.getElementById('alert-message').style.display === 'block') {
            calculateTimePassed();
        }
    }

    // Swaps static UI copy
    function applyLanguageStrings() {
        const trans = translations[currentLanguage];
        
        document.getElementById('app-title').innerHTML = trans.title;
        document.getElementById('app-subtitle').innerHTML = trans.subtitle;
        document.getElementById('start-clock-title').innerHTML = trans.startTitle;
        document.getElementById('finish-clock-title').innerHTML = trans.finishTitle;
        
        document.getElementById('start-hours-label').innerText = trans.hours;
        document.getElementById('start-mins-label').innerText = trans.mins;
        document.getElementById('finish-hours-label').innerText = trans.hours;
        document.getElementById('finish-mins-label').innerText = trans.mins;
        
        document.getElementById('btn-calculate-text').innerHTML = trans.calcBtn;
        document.getElementById('output-heading-text').innerText = trans.outputHeading;
        document.getElementById('timeline-title-text').innerText = trans.timelineTitle;
    }

    // Construct select lists for rapid deployment / adjustments
    function populateDropdowns() {
        const hStarts = document.getElementById('start-select-hour');
        const hFinishes = document.getElementById('finish-select-hour');
        const mStarts = document.getElementById('start-select-min');
        const mFinishes = document.getElementById('finish-select-min');

        for (let i = 1; i <= 12; i++) {
            hStarts.add(new Option(i + ' Hr', i));
            hFinishes.add(new Option(i + ' Hr', i));
        }

        for (let i = 0; i < 60; i += 5) {
            let label = i < 10 ? '0' + i : i;
            mStarts.add(new Option(label + ' Min', i));
            mFinishes.add(new Option(label + ' Min', i));
        }

        // Set defaults
        hStarts.value = state.start.hour;
        mStarts.value = state.start.minute;
        hFinishes.value = state.finish.hour;
        mFinishes.value = state.finish.minute;
    }

    // Programmatically generates clean numbers & notch paths on SVG
    function buildClockFaces() {
        const clocks = ['start-clock', 'finish-clock'];
        clocks.forEach(id => {
            const svg = document.getElementById(id);
            
            // Outer Dial Ring
            let dial = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dial.setAttribute("cx", "100");
            dial.setAttribute("cy", "100");
            dial.setAttribute("r", "94");
            dial.setAttribute("fill", "#ffffff");
            dial.setAttribute("stroke", "#475569");
            dial.setAttribute("stroke-width", "4");
            svg.insertBefore(dial, svg.firstChild);

            // Ticks & Numbers
            for (let i = 0; i < 60; i++) {
                let angle = i * 6; // 360 / 60
                let rad = (angle * Math.PI) / 180;
                
                if (i % 5 === 0) {
                    // Hour notch
                    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", (100 + 82 * Math.sin(rad)).toFixed(2));
                    line.setAttribute("y1", (100 - 82 * Math.cos(rad)).toFixed(2));
                    line.setAttribute("x2", (100 + 91 * Math.sin(rad)).toFixed(2));
                    line.setAttribute("y2", (100 - 91 * Math.cos(rad)).toFixed(2));
                    line.setAttribute("stroke", "#1e293b");
                    line.setAttribute("stroke-width", "3");
                    svg.insertBefore(line, svg.getElementById(id.replace('-clock', '-hour')));

                    // Hour Label (1 to 12)
                    let hourVal = i / 5;
                    if (hourVal === 0) hourVal = 12;
                    let num = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    num.setAttribute("x", (100 + 68 * Math.sin(rad)).toFixed(2));
                    num.setAttribute("y", (100 - 68 * Math.cos(rad) + 5.5).toFixed(2)); // Offset vertical baseline
                    num.setAttribute("text-anchor", "middle");
                    num.setAttribute("font-size", "18px");
                    num.setAttribute("font-weight", "900");
                    num.setAttribute("fill", "#334155");
                    num.textContent = hourVal;
                    svg.insertBefore(num, svg.getElementById(id.replace('-clock', '-hour')));
                } else {
                    // Minute notch
                    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", (100 + 87 * Math.sin(rad)).toFixed(2));
                    line.setAttribute("y1", (100 - 87 * Math.cos(rad)).toFixed(2));
                    line.setAttribute("x2", (100 + 91 * Math.sin(rad)).toFixed(2));
                    line.setAttribute("y2", (100 - 91 * Math.cos(rad)).toFixed(2));
                    line.setAttribute("stroke", "#94a3b8");
                    line.setAttribute("stroke-width", "1.5");
                    svg.insertBefore(line, svg.getElementById(id.replace('-clock', '-hour')));
                }
            }
        });
    }

    // Modifies values and schedules graphic re-renders
    function adjustTime(clock, unit, amount) {
        const clockState = state[clock];
        if (unit === 'hour') {
            let curHour = clockState.hour;
            curHour += amount;
            if (curHour > 12) curHour = 1;
            if (curHour < 1) curHour = 12;
            clockState.hour = curHour;
        } else if (unit === 'minute') {
            let curMin = clockState.minute;
            curMin += amount;
            if (curMin >= 60) {
                curMin = 0;
                adjustTime(clock, 'hour', 1); // cascade hour addition
            } else if (curMin < 0) {
                curMin = 55;
                adjustTime(clock, 'hour', -1); // cascade hour subtraction
            }
            clockState.minute = curMin;
        }
        updateUI(clock);
    }

    function setAMPM(clock, val) {
        state[clock].ampm = val;
        updateUI(clock);
    }

    function syncDropdowns(clock) {
        state[clock].hour = parseInt(document.getElementById(clock + '-select-hour').value);
        state[clock].minute = parseInt(document.getElementById(clock + '-select-min').value);
        updateUI(clock);
    }

    // Refreshes SVGs, labels, and dropdown positions
    function updateUI(clock) {
        const clockState = state[clock];
        
        // 1. Rotate clock hands
        // Calculated to rotate smoothly (gradual hour hand movement)
        const hourRotation = ((clockState.hour % 12) * 30) + (clockState.minute * 0.5);
        const minuteRotation = clockState.minute * 6;

        document.getElementById(clock + '-hour').setAttribute('transform', `rotate(${hourRotation} 100 100)`);
        document.getElementById(clock + '-minute').setAttribute('transform', `rotate(${minuteRotation} 100 100)`);

        // 2. Synchronize digital display
        const displayHr = clockState.hour < 10 ? '0' + clockState.hour : clockState.hour;
        const displayMin = clockState.minute < 10 ? '0' + clockState.minute : clockState.minute;
        
        // Translate AM/PM indicators based on current setting
        const ampmLabel = clockState.ampm === 'AM' ? translations[currentLanguage].amText : translations[currentLanguage].pmText;
        document.getElementById(clock + '-digital').innerText = `${displayHr}:${displayMin} ${ampmLabel}`;

        // 3. Update AM/PM controls state styles
        if (clockState.ampm === 'AM') {
            document.getElementById(clock + '-am-btn').classList.add('active');
            document.getElementById(clock + '-pm-btn').classList.remove('active');
        } else {
            document.getElementById(clock + '-pm-btn').classList.add('active');
            document.getElementById(clock + '-am-btn').classList.remove('active');
        }

        // Set localized switcher button text
        document.getElementById(clock + '-am-btn').innerText = translations[currentLanguage].amText;
        document.getElementById(clock + '-pm-btn').innerText = translations[currentLanguage].pmText;

        // 4. Update dropdown status
        document.getElementById(clock + '-select-hour').value = clockState.hour;
        document.getElementById(clock + '-select-min').value = clockState.minute;
    }

    // Converts active time states into cumulative 24H system minutes
    function getAbsoluteMinutes(timeObj) {
        let hr = timeObj.hour;
        if (timeObj.ampm === 'PM' && hr !== 12) hr += 12;
        if (timeObj.ampm === 'AM' && hr === 12) hr = 0;
        return (hr * 60) + timeObj.minute;
    }

    // Converts minutes to absolute 12H timestamp string
    function formatMinutesToTime(totalMins) {
        let hr24 = Math.floor(totalMins / 60) % 24;
        let mins = totalMins % 60;
        let ampm = hr24 >= 12 ? 'PM' : 'AM';
        let hr12 = hr24 % 12;
        if (hr12 === 0) hr12 = 12;
        
        let displayMins = mins < 10 ? '0' + mins : mins;
        let displayHrs = hr12 < 10 ? '0' + hr12 : hr12;
        
        let displayAMPM = ampm === 'AM' ? translations[currentLanguage].amText : translations[currentLanguage].pmText;
        
        if (currentLanguage === 'bilingual') {
            let zhPrefix = ampm === 'AM' ? '上午' : '下午';
            return {
                digital: `${displayHrs}:${displayMins} ${displayAMPM}`,
                label: `${zhPrefix} ${hr12}時${mins === 0 ? '' : mins + '分'}<br><span style="font-size: 0.85rem; font-weight: normal; opacity: 0.8;">(${displayHrs}:${displayMins} ${ampm})</span>`
            };
        } else {
            return {
                digital: `${displayHrs}:${displayMins} ${displayAMPM}`,
                label: `<span style="font-size: 1.1rem;">${hr12}:${displayMins} ${ampm}</span>`
            };
        }
    }

    // Logic engine to count elapsed distance
    function calculateTimePassed() {
        const startMins = getAbsoluteMinutes(state.start);
        const finishMins = getAbsoluteMinutes(state.finish);

        const alertBox = document.getElementById('alert-message');
        const outputBox = document.getElementById('output-box');
        const outputText = document.getElementById('output-text');
        const trans = translations[currentLanguage];

        // Reset display structures
        alertBox.style.display = 'none';
        outputBox.style.display = 'none';

        // P2 Rule validation: Finish must be after Start
        if (finishMins <= startMins) {
            alertBox.style.display = 'block';
            alertBox.innerHTML = trans.errorText;
            return;
        }

        const elapsedTotal = finishMins - startMins;
        const elapsedHours = Math.floor(elapsedTotal / 60);
        const elapsedMinutes = elapsedTotal % 60;

        // Build localized time strings
        let outputString = '';

        if (currentLanguage === 'bilingual') {
            let zhStr = '';
            let enStr = '';
            
            if (elapsedHours > 0) {
                zhStr += `<b>${elapsedHours}</b> ${trans.hourUnit} `;
                enStr += `<b>${elapsedHours}</b> ${elapsedHours === 1 ? 'hour' : 'hours'} `;
            }
            if (elapsedMinutes > 0) {
                zhStr += `<b>${elapsedMinutes}</b> ${trans.minUnit}`;
                if (elapsedHours > 0) enStr += `${trans.andText} `;
                enStr += `<b>${elapsedMinutes}</b> ${elapsedMinutes === 1 ? 'minute' : 'minutes'}`;
            }
            
            outputString = `${zhStr} <br> <span style="font-size: 1.8rem; font-weight: normal; color: #4b5563;">${enStr}</span>`;
        } else {
            if (elapsedHours > 0) {
                outputString += `<b>${elapsedHours}</b> ${elapsedHours === 1 ? trans.hourUnit : trans.hoursUnit} `;
            }
            if (elapsedMinutes > 0) {
                if (elapsedHours > 0) outputString += `${trans.andText} `;
                outputString += `<b>${elapsedMinutes}</b> ${elapsedMinutes === 1 ? trans.minUnit : trans.minsUnit}`;
            }
        }

        outputText.innerHTML = outputString;
        
        // Build the step-by-step visual timeline
        buildVisualTimeline(startMins, finishMins, elapsedHours, elapsedMinutes);
        
        // Show outcome
        outputBox.style.display = 'block';
    }

    // Renders the visual 'jump' diagram matching Primary school pedagogy
    function buildVisualTimeline(startMins, finishMins, elapsedHours, elapsedMinutes) {
        const diagram = document.getElementById('timeline-diagram');
        const trans = translations[currentLanguage];
        diagram.innerHTML = ''; // clear

        let current = startMins;
        
        // Step 1: Add Initial Node
        addNodeToDiagram(diagram, current, true);

        // Step 2: Render Hour Jumps
        for (let h = 0; h < elapsedHours; h++) {
            let next = current + 60;
            addArrowToDiagram(diagram, trans.hourJumpLabel);
            addNodeToDiagram(diagram, next, false);
            current = next;
        }

        // Step 3: Render Minute Jump (if any)
        if (elapsedMinutes > 0) {
            let next = current + elapsedMinutes;
            let label = currentLanguage === 'bilingual' 
                ? `${elapsedMinutes} 分鐘<br>${elapsedMinutes} Mins` 
                : `${elapsedMinutes} Mins`;
            addArrowToDiagram(diagram, label);
            addNodeToDiagram(diagram, next, true); // highlight final node
        }
    }

    function addNodeToDiagram(container, minutesValue, highlight = false) {
        const formatted = formatMinutesToTime(minutesValue);
        const node = document.createElement('div');
        node.className = `timeline-node ${highlight ? 'highlight' : ''}`;
        node.innerHTML = formatted.label;
        container.appendChild(node);
    }

    function addArrowToDiagram(container, labelText) {
        const wrapper = document.createElement('div');
        wrapper.className = 'timeline-arrow';

        const curve = document.createElement('div');
        curve.className = 'timeline-arrow-curve';

        const label = document.createElement('div');
        label.className = 'timeline-arrow-label';
        label.innerHTML = labelText;

        wrapper.appendChild(curve);
        wrapper.appendChild(label);
        container.appendChild(wrapper);
    }
</script>
